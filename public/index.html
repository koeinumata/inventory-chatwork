<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在庫管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    h2 { font-size: 12px; font-weight: 600; color: #777; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* サマリー */
    .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px 16px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: #777; margin-top: 4px; }

    /* 追加フォーム */
    .add-form { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; }
    .add-form .fields { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    input[type="text"], input[type="number"] {
      border: 1px solid #d1d1d1; border-radius: 6px; padding: 8px 10px;
      font-size: 16px; outline: none; width: 100%;
    }
    input:focus { border-color: #0066ff; }
    .input-name { flex: 1; min-width: 120px; }
    .input-qty  { width: 90px; flex-shrink: 0; }
    button {
      border: none; border-radius: 6px; padding: 8px 16px;
      font-size: 14px; cursor: pointer; white-space: nowrap; touch-action: manipulation;
    }
    .btn-primary { background: #0066ff; color: #fff; }
    .btn-primary:active { background: #0047cc; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-confirm { background: #0066ff; color: #fff; font-size: 13px; padding: 7px 14px; flex: 1; }
    .btn-confirm:active { background: #0047cc; }
    .btn-confirm:disabled { background: #ddd; color: #999; cursor: not-allowed; }
    .btn-danger  { background: transparent; color: #c0392b; border: 1px solid #e5e5e5; font-size: 13px; padding: 7px 14px; }
    .btn-danger:active { background: #fdecea; }

    /* 数量コントロール */
    .qty-control { display: inline-flex; align-items: center; gap: 6px; }
    .qty-input {
      width: 60px; text-align: center; font-size: 16px; font-weight: 600;
      border: 1px solid #d1d1d1; border-radius: 6px; padding: 6px 4px;
      -moz-appearance: textfield;
    }
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .qty-input:focus { border-color: #0066ff; }
    .qty-input.changed { border-color: #f59e0b; background: #fffbeb; }
    .qty-input.low-planned { color: #c0392b; border-color: #c0392b; }
    .arrow-btn {
      display: flex; flex-direction: column; gap: 2px;
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .arrow-btn span {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 22px; background: #f0f0f0; border-radius: 4px;
      font-size: 12px; color: #444; user-select: none;
    }
    .arrow-btn span:active { background: #d0d0d0; }

    /* ---- PC: テーブル ---- */
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
    th { font-size: 12px; font-weight: 600; color: #777; background: #fafafa; text-align: left; padding: 10px 14px; border-bottom: 1px solid #e5e5e5; }
    td { padding: 8px 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .td-actions { text-align: right; white-space: nowrap; }
    .td-actions button { margin-left: 4px; }

    /* ---- スマートフォン: カードレイアウト ---- */
    @media (max-width: 580px) {
      .container { padding: 16px 12px 48px; }
      h1 { font-size: 20px; margin-bottom: 16px; }

      /* テーブルをカード化 */
      table, thead, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }
      tr {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        margin-bottom: 10px;
        padding: 12px 14px;
      }
      tr:last-child { margin-bottom: 0; }
      td { border: none; padding: 4px 0; }

      /* 商品名 */
      td.td-name {
        font-size: 15px; font-weight: 600; padding-bottom: 10px;
        border-bottom: 1px solid #f0f0f0; margin-bottom: 8px;
      }

      /* 数量行: 横に2つ並べる */
      .qty-row {
        display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px;
      }
      .qty-block { flex: 1; }
      .qty-block-label {
        font-size: 11px; color: #777; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px;
      }
      .qty-block-label.red { color: #c0392b; }

      /* 操作ボタン行 */
      td.td-actions { display: flex; gap: 8px; padding-top: 6px; }
      td.td-actions button { margin: 0; }
    }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="container">
  <h1>在庫管理</h1>

  <div class="summary">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">商品種類数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-qty">—</div>
      <div class="stat-label">総在庫数</div>
    </div>
  </div>

  <div class="add-form">
    <h2>商品を追加</h2>
    <div class="fields">
      <input class="input-name" id="new-name" type="text" placeholder="商品名" />
      <input class="input-qty"  id="new-qty"  type="number" placeholder="数量" min="0" />
      <button class="btn-primary" id="add-btn" onclick="addItem()" disabled>追加</button>
    </div>
  </div>

  <h2 style="margin-bottom:10px">在庫一覧</h2>
  <table>
    <thead>
      <tr>
        <th>商品名</th>
        <th style="text-align:center">数量</th>
        <th style="text-align:center">予定数量</th>
        <th style="text-align:right">操作</th>
      </tr>
    </thead>
    <tbody id="inventory-body"></tbody>
  </table>
  <p style="margin-top:8px;font-size:12px;color:#999" id="count-label"></p>
</div>

<div class="toast" id="toast"></div>

<script>
  let items = [];
  let tempQty = {};
  let tempPlanned = {};

  const nameInput = document.getElementById("new-name");
  const qtyInput  = document.getElementById("new-qty");
  const addBtn    = document.getElementById("add-btn");

  nameInput.addEventListener("input", updateAddBtn);
  qtyInput.addEventListener("input", updateAddBtn);
  nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });

  function updateAddBtn() {
    addBtn.disabled = !nameInput.value.trim() || !qtyInput.value;
  }

  async function fetchInventory() {
    const res = await fetch("/api/inventory");
    items = await res.json();
    tempQty = {};
    tempPlanned = {};
    items.forEach((i) => {
      tempQty[i.id]     = i.quantity;
      tempPlanned[i.id] = i.planned ?? 0;
    });
    render();
  }

  const isMobile = () => window.innerWidth <= 580;

  function render() {
    const tbody = document.getElementById("inventory-body");
    const totalQty = items.reduce((s, i) => s + i.quantity, 0);
    document.getElementById("stat-total").textContent = items.length;
    document.getElementById("stat-qty").textContent = totalQty.toLocaleString();
    document.getElementById("count-label").textContent = `全 ${items.length} 件`;

    tbody.innerHTML = "";
    items.forEach((item) => {
      const current        = tempQty[item.id] ?? item.quantity;
      const planned        = tempPlanned[item.id] ?? (item.planned ?? 0);
      const qtyChanged     = current !== item.quantity;
      const plannedChanged = planned !== (item.planned ?? 0);
      const isOver         = planned > current;
      const anyChanged     = qtyChanged || plannedChanged;

      const qtyControlHtml = (id, val, changed, isRed, fnStep, fnInput, inputId) => `
        <div class="qty-control">
          <button class="arrow-btn" onclick="${fnStep}(${id}, 1)"><span>▲</span></button>
          <input
            class="qty-input${changed ? " changed" : ""}${isRed ? " low-planned" : ""}"
            id="${inputId}"
            type="number" min="0" value="${val}"
            onfocus="this.select()"
            oninput="${fnInput}(${id}, this.value)"
          />
          <button class="arrow-btn" onclick="${fnStep}(${id}, -1)"><span>▼</span></button>
        </div>`;

      const confirmDisabled = !anyChanged ? "disabled" : "";
      const tr = document.createElement("tr");

      if (isMobile()) {
        // カードレイアウト
        tr.innerHTML = `
          <td class="td-name">${esc(item.name)}</td>
          <td>
            <div class="qty-row">
              <div class="qty-block">
                <div class="qty-block-label">数量</div>
                ${qtyControlHtml(item.id, current, qtyChanged, false, "stepQty", "onQtyInput", `qty-input-${item.id}`)}
              </div>
              <div class="qty-block">
                <div class="qty-block-label${isOver ? " red" : ""}">予定数量</div>
                ${qtyControlHtml(item.id, planned, plannedChanged, isOver, "stepPlanned", "onPlannedInput", `planned-input-${item.id}`)}
              </div>
            </div>
          </td>
          <td class="td-actions">
            <button id="confirm-btn-${item.id}" class="btn-confirm" onclick="confirmUpdate(${item.id})" ${confirmDisabled}>確定</button>
            <button class="btn-danger"  onclick="deleteItem(${item.id})">削除</button>
          </td>`;
      } else {
        // テーブルレイアウト
        tr.innerHTML = `
          <td>${esc(item.name)}</td>
          <td style="text-align:center">
            ${qtyControlHtml(item.id, current, qtyChanged, false, "stepQty", "onQtyInput", `qty-input-${item.id}`)}
          </td>
          <td style="text-align:center${isOver ? ";color:#c0392b;font-weight:600" : ""}">
            ${qtyControlHtml(item.id, planned, plannedChanged, isOver, "stepPlanned", "onPlannedInput", `planned-input-${item.id}`)}
          </td>
          <td class="td-actions">
            <button id="confirm-btn-${item.id}" class="btn-confirm" onclick="confirmUpdate(${item.id})" ${confirmDisabled}>確定</button>
            <button class="btn-danger"  onclick="deleteItem(${item.id})">削除</button>
          </td>`;
      }
      tbody.appendChild(tr);
    });
  }

  // 画面リサイズ時に再描画
  window.addEventListener("resize", render);

  function onQtyInput(id, value) {
    const v = parseInt(value, 10);
    if (!isNaN(v) && v >= 0) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const origQty     = item.quantity;
      const origPlanned = item.planned ?? 0;

      // 直前の一時値との差分で予定数量を連動させる（減った分だけ減らす）
      const prev = tempQty[id] ?? origQty;
      const diff = v - prev;
      tempQty[id] = v;
      if (diff < 0) {
        tempPlanned[id] = Math.max(0, (tempPlanned[id] ?? origPlanned) + diff);
      }

      // 入力中は再描画せず、各要素を直接更新する
      const qtyEl = document.getElementById(`qty-input-${id}`);
      if (qtyEl) qtyEl.classList.toggle('changed', v !== origQty);

      const curPlanned = tempPlanned[id] ?? origPlanned;
      const plannedEl = document.getElementById(`planned-input-${id}`);
      if (plannedEl) {
        plannedEl.value = curPlanned;
        plannedEl.classList.toggle('changed', curPlanned !== origPlanned);
        plannedEl.classList.toggle('low-planned', curPlanned > v);
      }

      const anyChanged = v !== origQty || curPlanned !== origPlanned;
      const confirmBtn = document.getElementById(`confirm-btn-${id}`);
      if (confirmBtn) confirmBtn.disabled = !anyChanged;
    }
  }

  function stepQty(id, delta) {
    tempQty[id] = Math.max(0, (tempQty[id] ?? 0) + delta);
    if (delta < 0) {
      tempPlanned[id] = Math.max(0, (tempPlanned[id] ?? 0) + delta);
    }
    render();
  }

  function onPlannedInput(id, value) {
    const v = parseInt(value, 10);
    if (!isNaN(v) && v >= 0) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      tempPlanned[id] = v;

      // 入力中は再描画せず、各要素を直接更新する
      const currentQty  = tempQty[id] ?? item.quantity;
      const origPlanned = item.planned ?? 0;

      const plannedEl = document.getElementById(`planned-input-${id}`);
      if (plannedEl) {
        plannedEl.classList.toggle('changed', v !== origPlanned);
        plannedEl.classList.toggle('low-planned', v > currentQty);
      }

      const anyChanged = currentQty !== item.quantity || v !== origPlanned;
      const confirmBtn = document.getElementById(`confirm-btn-${id}`);
      if (confirmBtn) confirmBtn.disabled = !anyChanged;
    }
  }

  function stepPlanned(id, delta) {
    tempPlanned[id] = Math.max(0, (tempPlanned[id] ?? 0) + delta);
    render();
  }

  async function confirmUpdate(id) {
    const item = items.find((i) => i.id === id);
    if (!item) return;
    const qty            = tempQty[id] ?? item.quantity;
    const planned        = tempPlanned[id] ?? (item.planned ?? 0);
    const qtyChanged     = qty     !== item.quantity;
    const plannedChanged = planned !== (item.planned ?? 0);

    if (qtyChanged) {
      await fetch(`/api/inventory/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: item.name, quantity: qty }),
      });
    }
    if (plannedChanged) {
      await fetch(`/api/inventory/${id}/planned`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ planned }),
      });
    }

    await fetchInventory();
    showToast(qtyChanged ? "更新しました（Chatworkに通知済み）" : "予定数量を更新しました");
  }

  async function addItem() {
    const name     = nameInput.value.trim();
    const quantity = parseInt(qtyInput.value, 10);
    if (!name || isNaN(quantity)) return;
    await fetch("/api/inventory", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, quantity }),
    });
    nameInput.value = "";
    qtyInput.value  = "";
    updateAddBtn();
    await fetchInventory();
    showToast("商品を追加しました");
  }

  async function deleteItem(id) {
    if (!confirm("この商品を削除しますか？")) return;
    await fetch(`/api/inventory/${id}`, { method: "DELETE" });
    await fetchInventory();
    showToast("削除しました");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  function esc(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  fetchInventory();
</script>
</body>
</html>
