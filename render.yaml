services:
  - type: web
    name: inventory-chatwork
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-chatwork-db
          property: connectionString
      - key: CHATWORK_API_TOKEN
        sync: false
      - key: CHATWORK_ROOM_ID
        value: "436461417"

databases:
  - name: inventory-chatwork-db
    databaseName: inventory_db
    user: inventory_user
    plan: starter
